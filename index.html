<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>NEURALIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&family=Fascinate+Inline&family=Honk:MORF@15&family=Sekuya&family=Lora:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: 'var(--accent-color)',
                        'accent-light': 'var(--accent-light)',
                        'accent-dark': 'var(--accent-dark)',
                        card: 'var(--bg-card)',
                        'card-hover': 'var(--bg-card-hover)',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#facc15',
                        gold: '#fbbf24',
                    },
                    fontFamily: {
                        heading: 'var(--font-heading)',
                        body: 'var(--font-body)',
                        display: 'var(--font-display)',
                        mono: ['"Share Tech Mono"', 'monospace'],
                        logo: ['var(--font-logo)', 'sans-serif'],
                        greetings: ['var(--font-greetings)', 'sans-serif'],
                        sans: ['var(--font-body)', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-glow': 'pulseGlow 2s infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 20px var(--accent-color)' },
                            '50%': { boxShadow: '0 0 40px var(--accent-light)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --accent-color: #9d4edd;
            --accent-light: #c77dff;
            --accent-dark: #7b2cbf;
            --bg-card: rgba(20, 20, 30, 0.6);
            --bg-card-hover: rgba(30, 30, 45, 0.8);
            --font-heading: 'Rajdhani', sans-serif;
            --font-body: 'Archivo', sans-serif;
            --font-display: 'Orbitron', sans-serif;
            --bg-blur: 10px;
        }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-dark);
            border-radius: 10px;
        }
        .glass-panel {
            backdrop-filter: blur(var(--bg-blur));
            -webkit-backdrop-filter: blur(var(--bg-blur));
        }
        /* Hardware acceleration */
        .hardware-accel {
            transform: translate3d(0, 0, 0);
            will-change: transform, opacity;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.567.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "clsx": "https://esm.sh/clsx@^2.1.1",
    "three": "https://esm.sh/three@0.160.0",
    "cls": "https://esm.sh/cls@^0.1.5"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
